<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>呼び出しアプリ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap');

  :root {
    --bg: #111318;
    --card: #1E2028;
    --card2: #252830;
    --border: #2E3140;
    --text: #F0F0F5;
    --subtext: #7A7F94;
    --shadow: rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px 40px;
  }

  .header {
    text-align: center;
    margin-bottom: 28px;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 4px;
  }

  .subtitle {
    color: var(--subtext);
    font-size: 0.82rem;
  }

  .buttons-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    width: 100%;
    max-width: 360px;
  }

  .call-btn {
    border: none;
    border-radius: 20px;
    padding: 26px 14px 20px;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-size: 0.92rem;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    box-shadow: 0 8px 24px var(--shadow);
    transition: transform 0.12s, box-shadow 0.12s, filter 0.12s;
    text-align: center;
    line-height: 1.4;
  }

  .call-btn:active {
    transform: scale(0.94);
    box-shadow: 0 2px 8px var(--shadow);
    filter: brightness(0.9);
  }

  .call-btn .emoji { font-size: 2.2rem; line-height: 1; }

  .call-btn.dinner  { background: linear-gradient(140deg, #FF6B6B 0%, #FF8E53 100%); }
  .call-btn.come    { background: linear-gradient(140deg, #4D96FF 0%, #6FBAFF 100%); }
  .call-btn.urgent  { background: linear-gradient(140deg, #FF2D55 0%, #FF0066 100%); }
  .call-btn.tea     { background: linear-gradient(140deg, #30D158 0%, #34C759 100%); }

  .custom-area {
    width: 100%;
    max-width: 360px;
    margin-top: 14px;
    background: var(--card);
    border-radius: 20px;
    padding: 18px;
    box-shadow: 0 4px 16px var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 10px;
    border: 1px solid var(--border);
  }

  .custom-area label {
    font-size: 0.78rem;
    color: var(--subtext);
    font-weight: 700;
  }

  .custom-area input {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-size: 0.9rem;
    background: var(--card2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    outline: none;
    color: var(--text);
    transition: border-color 0.15s;
  }
  .custom-area input:focus { border-color: #4D96FF; }
  .custom-area input::placeholder { color: var(--subtext); }

  .custom-area button {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-size: 0.92rem;
    font-weight: 700;
    background: linear-gradient(135deg, #A78BFA, #7C3AED);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 12px;
    cursor: pointer;
    transition: transform 0.12s, filter 0.12s;
  }
  .custom-area button:active { transform: scale(0.96); filter: brightness(0.9); }

  .settings-card {
    width: 100%;
    max-width: 360px;
    margin-top: 14px;
    background: var(--card);
    border-radius: 20px;
    padding: 18px;
    box-shadow: 0 4px 16px var(--shadow);
    border: 1px solid var(--border);
  }

  .settings-title {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--subtext);
    margin-bottom: 12px;
  }

  .settings-row {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-bottom: 12px;
  }
  .settings-row label { font-size: 0.76rem; color: var(--subtext); }
  .settings-row input {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-size: 0.85rem;
    background: var(--card2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 9px 12px;
    outline: none;
    color: var(--text);
    transition: border-color 0.15s;
  }
  .settings-row input:focus { border-color: #4D96FF; }
  .settings-row input::placeholder { color: var(--subtext); }

  .save-btn {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    background: var(--card2);
    color: var(--text);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 20px;
    cursor: pointer;
    width: 100%;
    transition: background 0.15s;
  }
  .save-btn:hover { background: #2E3140; }
  .save-btn:active { opacity: 0.8; }

  #toast {
    position: fixed;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: var(--bg);
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    padding: 11px 26px;
    border-radius: 100px;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .toggle-settings {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    background: none;
    border: none;
    color: var(--subtext);
    font-size: 0.78rem;
    cursor: pointer;
    margin-top: 10px;
    text-decoration: underline;
  }
</style>
</head>
<body>

<div class="header">
  <h1>📣 呼び出しアプリ</h1>
  <p class="subtitle">ボタンを押すとDiscordに通知が届くよ！</p>
</div>

<div class="buttons-grid">
  <button class="call-btn dinner" onclick="sendMessage('🍽️ 夕飯できたよ！来て〜！')">
    <span class="emoji">🍽️</span>夕飯だよ！<br>来て〜！
  </button>
  <button class="call-btn come" onclick="sendMessage('📢 ちょっと来てほしいな！')">
    <span class="emoji">📢</span>ちょっと<br>来て！
  </button>
  <button class="call-btn urgent" onclick="sendMessage('🚨 今すぐ来て！！緊急！！')">
    <span class="emoji">🚨</span>今すぐ<br>来て！！
  </button>
  <button class="call-btn tea" onclick="sendMessage('☕ お茶できたよ！来て〜')">
    <span class="emoji">☕</span>お茶<br>できたよ！
  </button>
</div>

<div class="custom-area">
  <label>💬 自由メッセージ</label>
  <input type="text" id="customMsg" placeholder="メッセージを入力..." maxlength="100">
  <button onclick="sendCustom()">📨 送信する</button>
</div>

<button class="toggle-settings" onclick="toggleSettings()">⚙️ 設定を開く / 閉じる</button>

<div class="settings-card" id="settingsCard" style="display:none">
  <div class="settings-title">⚙️ Discord 設定</div>
  <div class="settings-row">
    <label>Webhook URL</label>
    <input type="text" id="webhookUrl" placeholder="https://discord.com/api/webhooks/...">
  </div>
  <div class="settings-row">
    <label>送信者の名前（任意）</label>
    <input type="text" id="senderName" placeholder="例：奥さん" value="家族">
  </div>
  <button class="save-btn" onclick="saveSettings()">💾 保存する</button>
</div>

<div id="toast"></div>

<script>
  let webhook = localStorage.getItem('discord_webhook') || '';
  let sender = localStorage.getItem('discord_sender') || '家族';

  document.getElementById('webhookUrl').value = webhook;
  document.getElementById('senderName').value = sender;

  function saveSettings() {
    webhook = document.getElementById('webhookUrl').value.trim();
    sender = document.getElementById('senderName').value.trim() || '家族';
    localStorage.setItem('discord_webhook', webhook);
    localStorage.setItem('discord_sender', sender);
    showToast('✅ 保存したよ！');
  }

  function toggleSettings() {
    const card = document.getElementById('settingsCard');
    card.style.display = card.style.display === 'none' ? 'block' : 'none';
  }

  async function sendMessage(text) {
    if (!webhook) {
      showToast('⚠️ 設定でWebhook URLを入力してね！');
      document.getElementById('settingsCard').style.display = 'block';
      return;
    }
    const payload = {
      username: sender,
      content: `@everyone ${text}`
    };
    try {
      const res = await fetch(webhook, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (res.ok) {
        showToast('📨 送信したよ！');
      } else {
        showToast('❌ 送信失敗... URLを確認してね');
      }
    } catch (e) {
      showToast('❌ エラーが発生したよ');
    }
  }

  function sendCustom() {
    const msg = document.getElementById('customMsg').value.trim();
    if (!msg) { showToast('⚠️ メッセージを入力してね！'); return; }
    sendMessage('💬 ' + msg);
    document.getElementById('customMsg').value = '';
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
